<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>for you ♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080808;
      --text: #f2ece4;
      --accent: #ff7eb3;
      --accent2: #c084fc;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── HEARTS ─────────────────────────────────────── */
    .heart {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      animation: floatUp linear infinite;
      will-change: transform, opacity;
      user-select: none;
    }

    @keyframes floatUp {
      0%   { transform: translateY(105vh) rotate(-15deg) scale(0.6); opacity: 0; }
      8%   { opacity: 1; }
      85%  { opacity: 0.9; }
      100% { transform: translateY(-15vh) rotate(25deg) scale(1.1);  opacity: 0; }
    }

    /* ── TYPEWRITER SECTION ─────────────────────────── */
    #typewriter-section {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      gap: 0;
      transition: opacity 1.6s ease;
    }

    .lane-wrap {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .lane {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.9rem, 2.2vw, 1.25rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
      min-height: 1.8em;
      line-height: 1.7;
      position: relative;
    }

    .lane::after {
      content: '|';
      color: var(--accent);
      animation: blink 0.75s step-end infinite;
      margin-left: 1px;
    }

    .lane.cursor-off::after {
      display: none;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .lane-divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0.2rem 0;
      opacity: 0.5;
    }

    /* ── LYRICS SECTION ─────────────────────────────── */
    #lyrics-section {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      text-align: center;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #lyrics-section.visible {
      display: flex;
    }

    #lyrics-section.fade-in {
      opacity: 1;
    }

    .lyrics-label {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.6rem, 1.2vw, 0.75rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3.5rem;
      opacity: 0.75;
    }

    .lyrics-inner {
      max-width: 560px;
    }

    .lyric-line {
      display: block;
      font-size: clamp(1.3rem, 3.5vw, 2rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.95;
      color: var(--text);
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .lyric-line.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .lyrics-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,126,179,0.08) 0%, transparent 70%);
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .song-credit {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.55rem, 1vw, 0.68rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-top: 3.5rem;
      opacity: 0;
      transition: opacity 1.2s ease 1s;
    }

    .song-credit.revealed {
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <!-- TYPEWRITER -->
  <section id="typewriter-section">
    <div class="lane-wrap">
      <div class="lane" id="lane1"></div>
      <div class="lane-divider"></div>
      <div class="lane" id="lane2"></div>
    </div>
  </section>

  <!-- LYRICS -->
  <section id="lyrics-section">
    <div class="lyrics-glow"></div>
    <p class="lyrics-label">Soulmate — mac miller</p>
    <div class="lyrics-inner" id="lyrics-lines"></div>
    <p class="song-credit" id="song-credit">0:45 — 1:05</p>
  </section>

  <script>
    // ─────────────────────────────────────────────────────
    //  HEARTS
    // ─────────────────────────────────────────────────────
    const HEART_COLORS = [
      '#ff6b8a', '#ff9eb5', '#ffb6c1', '#ffccd5',
      '#c084fc', '#d946ef', '#f0abfc',
      '#fb923c', '#fbbf24',
      '#67e8f9', '#34d399',
      '#f87171', '#ff4d6d',
    ];

    function spawnHeart() {
      const el = document.createElement('span');
      el.className = 'heart';
      el.textContent = '♥';
      const size = Math.random() * 20 + 8;
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        font-size: ${size}px;
        color: ${HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)]};
        animation-duration: ${Math.random() * 9 + 7}s;
        animation-delay: ${Math.random() * 4}s;
        opacity: 0;
        text-shadow: 0 0 ${Math.round(size * 0.8)}px currentColor;
      `;
      document.body.appendChild(el);
      const ttl = (parseFloat(el.style.animationDuration) + parseFloat(el.style.animationDelay) + 1) * 1000;
      setTimeout(() => el.remove(), ttl);
    }

    // initial burst
    for (let i = 0; i < 25; i++) setTimeout(spawnHeart, i * 120);
    // continuous rain
    setInterval(spawnHeart, 380);


    // ─────────────────────────────────────────────────────
    //  TYPEWRITER SEQUENCES
    //  Edit these messages if you want different text ↓
    // ─────────────────────────────────────────────────────
    const SEQUENCES = [
      ["hola mi nini, mi isa,", "mi querido amor hermoso."],
      ["quiero que sepas como te amo", "y que siempre voy a estar aqui para ti."],
      ["en las mejores y en las peores,", "que nunca te voy a volver a fallar."],
      ["no puedo esperar por llegar a ser viejitos", "y ver todo lo que hemos vivido juntos."],
      ["cada experiencia, cada aventura,", "cada simple cosita que hagamos juntos."],
      ["te amo con todo mi corazon", "y espero que siempre sepas"],
      ["que siempre voy a estar a tu lado.", "amandote de la mejor manera. ♥"],
    ];

    // ─────────────────────────────────────────────────────
    //  LYRICS  ←  PASTE THE LINES HERE, one per string
    //  (replace the placeholder lines below)
    // ─────────────────────────────────────────────────────
    const LYRICS = [
      "I think you're too divine for my human mind",
      "When I'm with you, what do you do? Bring me to life",
      "You the one to show me",
      "Divine love (Love), love (Love), love (Love), love",
      "When the stereo plays our song, sounds so clear",
    ];


    // ─────────────────────────────────────────────────────
    //  ENGINE
    // ─────────────────────────────────────────────────────
    const lane1 = document.getElementById('lane1');
    const lane2 = document.getElementById('lane2');
    const twSection = document.getElementById('typewriter-section');
    const lySection = document.getElementById('lyrics-section');
    const lyricsLines = document.getElementById('lyrics-lines');
    const songCredit = document.getElementById('song-credit');

    const wait = ms => new Promise(r => setTimeout(r, ms));

    function typeText(el, text, speed = 52) {
      return new Promise(resolve => {
        let i = 0;
        el.classList.remove('cursor-off');
        const iv = setInterval(() => {
          el.textContent += text[i++];
          if (i >= text.length) { clearInterval(iv); resolve(); }
        }, speed);
      });
    }

    function eraseText(el, speed = 28) {
      return new Promise(resolve => {
        const iv = setInterval(() => {
          if (!el.textContent.length) { clearInterval(iv); resolve(); return; }
          el.textContent = el.textContent.slice(0, -1);
        }, speed);
      });
    }

    async function runTypewriter() {
      for (const [t1, t2] of SEQUENCES) {
        await typeText(lane1, t1);
        await typeText(lane2, t2);
        await wait(2000);
        await Promise.all([eraseText(lane1), eraseText(lane2)]);
        await wait(450);
      }
      // fade out typewriter
      twSection.style.opacity = '0';
      await wait(1700);
      twSection.style.display = 'none';

      // build lyrics DOM
      LYRICS.forEach(line => {
        const span = document.createElement('span');
        span.className = 'lyric-line';
        span.textContent = line;
        lyricsLines.appendChild(span);
      });

      // show lyrics section
      lySection.classList.add('visible');
      await wait(50);
      lySection.classList.add('fade-in');

      // stagger reveal each line
      const lines = lyricsLines.querySelectorAll('.lyric-line');
      for (let i = 0; i < lines.length; i++) {
        await wait(i === 0 ? 600 : 550);
        lines[i].classList.add('revealed');
      }
      await wait(700);
      songCredit.classList.add('revealed');
    }

    runTypewriter();
  </script>
</body>
</html>
